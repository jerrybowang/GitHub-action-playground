name: Weekly Branch Activity Check

on:
  workflow_dispatch:

jobs:
  check-branch-activity:
    runs-on: ubuntu-latest
    outputs:
      has_activity: ${{ steps.check_activity.outputs.has_activity }}
    steps:

    - name: Check branch activity
      id: check_activity
      run: |
        current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        last_week_time=$(date -u -d "$current_time - 7 days" +"%Y-%m-%dT%H:%M:%SZ")
        
        # List branches created or deleted in the last week
        branches=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/events?per_page=100" | \
          jq -r --arg last_week_time "$last_week_time" \
          '[.[] | select(.type == "CreateEvent" or .type == "DeleteEvent") | select(.created_at >= $last_week_time)]')

        echo "Branches: $branches"
        if [ "$branches" == "[]" ]; then
          echo "has_activity=false" >> $GITHUB_OUTPUT
        else
          echo "has_activity=true" >> $GITHUB_OUTPUT
        fi

  intensive-work:
    runs-on: ubuntu-latest
    needs: check-branch-activity
    if: needs.check-branch-activity.outputs.has_activity == 'true'
    steps:
    - name: Do intensive work
      run: echo "Performing intensive work..."
